services:
  postgres:
    image: postgres:16-alpine
    container_name: forms-postgres
    environment:
      POSTGRES_DB: forms
      POSTGRES_USER: forms
      POSTGRES_PASSWORD: forms
    ports:
      - "5432:5432"
    volumes:
      - forms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forms -d forms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  forms-pgdata:
